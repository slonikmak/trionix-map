name: Release to GitHub Packages and Releases

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Set to true to run an actual deploy (use with care). Defaults to false.'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and Publish to GitHub Packages
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
        run: mvn --batch-mode -pl trionix-map-core,trionix-map-layers -am deploy -DskipTests=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            **/target/*.jar
            **/target/*-sources.jar
            **/target/*-javadoc.jar

      - name: Warm and Verify JitPack Artifacts
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          BASE="https://jitpack.io/com/github/slonikmak/trionix-map"
          echo "Trigger JitPack build for ${TAG}"
          curl -fsSL "${BASE}/${TAG}/build.log" > /tmp/jitpack-build.log || true
          echo "Waiting for JitPack module POMs..."
          for i in {1..20}; do
            CORE_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${BASE}/trionix-map-core/${TAG}/trionix-map-core-${TAG}.pom" || true)
            LAYERS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${BASE}/trionix-map-layers/${TAG}/trionix-map-layers-${TAG}.pom" || true)
            echo "Attempt ${i}: core=${CORE_CODE}, layers=${LAYERS_CODE}"
            if [[ "${CORE_CODE}" == "200" && "${LAYERS_CODE}" == "200" ]]; then
              echo "JitPack artifacts are available for ${TAG}"
              exit 0
            fi
            sleep 15
          done
          echo "JitPack artifacts were not ready in time for ${TAG}"
          exit 1
